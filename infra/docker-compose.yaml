services:
  postgres:
    image: postgres:16.2
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_HOST_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - psa-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8.2-alpine
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - psa-network
    command: redis-server --appendonly yes --save 900 1 --save 300 10 --save 60 10000
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  migrator:
    build:
      context: .
      dockerfile: tools/migrator/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      CONFIG_PATH: ${CONFIG_PATH}
    volumes:
      - ./config:/config
      - ./migrations:/migrations
      - ./.env:/app/.env
    command: ["--migrations-path=/migrations"]
    networks:
      - psa-network

  create-admin:
    build:
      context: .
      dockerfile: tools/admin/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      CONFIG_PATH: ${CONFIG_PATH}
    volumes:
      - ./config:/config
      - ./.env:/app/.env
    networks:
      - psa-network
    restart: no

  backend:
    build:
      context: .
      dockerfile: cmd/psa/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      CONFIG_PATH: ${CONFIG_PATH}
    ports:
      - "${APP_HOST_PORT:-8080}:${SRV_PORT:-8080}"
    volumes:
      - ./config:/config
      - ./.env:/app/.env
    networks:
      - psa-network

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "${PROMETHEUS_HOST_PORT:-9090}:9090"
    volumes:
      - ./infra/prometheus/prometheus.yaml:/etc/prometheus/prometheus.yaml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yaml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - psa-network

  loki:
    image: grafana/loki:latest
    ports:
      - "${LOKI_HOST_PORT:-3100}:3100"
    command:
      - "-config.file=/etc/loki/config.yaml"
    volumes:
      - ./infra/loki/config.yaml:/etc/loki/config.yaml
      - loki_data:/loki
    networks:
      - psa-network

  alloy:
    image: grafana/alloy:latest
    command:
      - "run"
      - "/etc/alloy/config.alloy"
    depends_on:
      - loki
    volumes:
      - ./infra/alloy/config.alloy:/etc/alloy/config.alloy
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - psa-network

  grafana:
    image: grafana/grafana:latest
    ports:
      - "${GRAFANA_HOST_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards
    networks:
      - psa-network

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  loki_data:
  grafana_data:

networks:
  psa-network:
    driver: bridge
