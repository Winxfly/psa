services:
  caddy:
    image: caddy:2.10.2-alpine
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
      CADDY_EMAIL: ${CADDY_EMAIL}
    depends_on:
      backend:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./infra/caddy/site:/usr/share/caddy:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - psa-network
    restart: unless-stopped

  postgres:
    image: postgres:18.3
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - psa-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:8.6.2-alpine
    volumes:
      - redis_data:/data
    networks:
      - psa-network
    command: redis-server --appendonly yes --save 900 1 --save 300 10 --save 60 10000
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  migrator:
    build:
      context: .
      dockerfile: tools/migrator/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      CONFIG_PATH: /config/prod.yaml
    volumes:
      - ./config:/config:ro
      - ./migrations:/migrations:ro
      - ./.env:/app/.env:ro
    command: ["--migrations-path=/migrations"]
    networks:
      - psa-network

  create-admin:
    build:
      context: .
      dockerfile: tools/admin/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      CONFIG_PATH: /config/prod.yaml
    volumes:
      - ./config:/config:ro
      - ./.env:/app/.env:ro
    networks:
      - psa-network
    restart: "no"

  backend:
    build:
      context: .
      dockerfile: cmd/psa/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      CONFIG_PATH: /config/prod.yaml
    volumes:
      - ./config:/config:ro
      - ./.env:/app/.env:ro
    networks:
      - psa-network
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "127.0.0.1:${PROMETHEUS_HOST_PORT:-9090}:9090"
    volumes:
      - ./infra/prometheus/prometheus.yaml:/etc/prometheus/prometheus.yaml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yaml"
      - "--storage.tsdb.path=/prometheus"
    networks:
      - psa-network
    restart: unless-stopped

  loki:
    image: grafana/loki:latest
    volumes:
      - ./infra/loki/config.yaml:/etc/loki/config.yaml:ro
      - loki_data:/loki
    command:
      - "-config.file=/etc/loki/config.yaml"
    networks:
      - psa-network
    restart: unless-stopped

  alloy:
    image: grafana/alloy:latest
    command:
      - "run"
      - "/etc/alloy/config.alloy"
    depends_on:
      - loki
    volumes:
      - ./infra/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - psa-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    ports:
      - "127.0.0.1:${GRAFANA_HOST_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - psa-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  loki_data:
  grafana_data:
  caddy_data:
  caddy_config:

networks:
  psa-network:
    driver: bridge
